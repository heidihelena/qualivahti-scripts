<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 400" role="img" aria-labelledby="hero-title hero-desc">
<title id="hero-title">QualiVahti workflow</title>
<desc id="hero-desc">Audio or text is transcribed locally; an AI suggests codes; the researcher accepts, edits or rejects each suggestion; only human-reviewed codes become evidence-linked themes and publication outputs.</desc>
